name: ${COMPOSE_PROJECT_NAME}

services:
  mariadb:
    container_name: "${COMPOSE_PROJECT_NAME}_database"
    image: mariadb:latest
    restart: always
    environment:
      MARIADB_USER: "${DB_USER}"
      MARIADB_PASSWORD: "${DB_PASS}"
      MARIADB_DATABASE: "${COMPOSE_PROJECT_NAME}"
      MARIADB_RANDOM_ROOT_PASSWORD: yes
    volumes:
      - ./.database:/var/lib/mysql

  nginx:
    container_name: "${COMPOSE_PROJECT_NAME}_nginx"
    image: nginx:latest
    restart: always
    environment:
      NGINX_HOST: "${COMPOSE_PROJECT_NAME}.localhost"
    ports:
      - "80:80"

  wordpress:
    container_name: "${COMPOSE_PROJECT_NAME}_wordpress"
    image: wordpress:php7.4-fpm
    restart: always
    depends_on:
      - mariadb
      - nginx
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: "${DB_USER}"
      WORDPRESS_DB_PASSWORD: "${DB_PASS}"
      WORDPRESS_DB_NAME: "${COMPOSE_PROJECT_NAME}"
    volumes:
      - ./site:/var/www/html

  wp-cli:
    container_name: "${COMPOSE_PROJECT_NAME}_wpcli"
    image: wordpress:cli-php7.4
    depends_on:
      - mariadb
      - wordpress
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: "${DB_USER}"
      WORDPRESS_DB_PASSWORD: "${DB_PASS}"
      WORDPRESS_DB_NAME: "${COMPOSE_PROJECT_NAME}"
    volumes_from:
      - wordpress
    working_dir: /var/www/html
    user: "33:33"
    command: "wp cli info"

  composer:
    container_name: "${COMPOSE_PROJECT_NAME}_composer"
    image: composer:latest
    depends_on:
      - wordpress
    volumes_from:
      - wordpress
    working_dir: /var/www/html

  node:
    container_name: "${COMPOSE_PROJECT_NAME}_node"
    image: node:lts
    volumes_from:
      - wordpress
    working_dir: /var/www/html
